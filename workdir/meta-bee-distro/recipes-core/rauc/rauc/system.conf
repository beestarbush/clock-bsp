[system]
compatible=bee-os
bootloader=custom
data-directory=/data/rauc
bundle-formats=-plain

[handlers]
bootloader-custom-backend=/usr/lib/rauc/rpi-tryboot-backend.sh

[keyring]
path=/etc/rauc/ca.cert.pem

[slot.boot.0]
device=/dev/mmcblk0p2
type=vfat
bootname=A

[slot.boot.1]
device=/dev/mmcblk0p3
type=vfat
bootname=B

[slot.rootfs.0]
device=/dev/mmcblk0p4
type=ext4
parent=boot.0

[slot.rootfs.1]
device=/dev/mmcblk0p5
type=ext4
parent=boot.1
