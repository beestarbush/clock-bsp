# clock-webapp lighttpd configuration
#
# Installed to /etc/lighttpd.d/ which is included by lighttpd's main config:
#   include "/etc/lighttpd.d/*.conf"

server.modules += (
    "mod_proxy",
    "mod_wstunnel",
)

# Serve the webapp on port 5173
$SERVER["socket"] == ":5173" {
    server.document-root = "/usr/share/bee/webapp"
    index-file.names     = ("index.html")

    # SPA fallback — serve index.html for unknown paths (mod_rewrite is built-in, no .so)
    server.error-handler-404 = "/index.html"

    # Proxy WebSocket connections to clock-backend
    $HTTP["url"] =~ "^/ws" {
        wstunnel.server = (
            "/ws" => (( "host" => "127.0.0.1", "port" => 5000 ))
        )
        wstunnel.websocket-ping-interval = 60
    }

    # Proxy media file requests to clock-backend
    $HTTP["url"] =~ "^/media" {
        proxy.server = (
            "/media" => (( "host" => "127.0.0.1", "port" => 5000 ))
        )
    }
}
